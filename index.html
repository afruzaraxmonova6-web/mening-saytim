<!DOCTYPE html>
<html>
<head>
    <title>Kamera Tekshiruvi</title>
    <style>
        body { background: #000; color: white; text-align: center; font-family: sans-serif; }
        video { width: 80%; border-radius: 15px; border: 5px solid #3b82f6; margin-top: 20px; }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; background: #3b82f6; color: white; border: none; border-radius: 10px; }
    </style>
</head>
<body>
    <h1>AI Kamera Testi</h1>
    <button onclick="cameraYoqish()">KAMERANI YOQISH</button>
    <br>
    <video id="video" autoplay playsinline></video>

    <script>
        async function cameraYoqish() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                const video = document.getElementById('video');
                video.srcObject = stream;
            } catch (err) {
                alert("Xato: " + err.name + " - " + err.message);
            }
        }
    </script>
</body>
</html>
