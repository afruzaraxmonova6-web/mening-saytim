<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Ot Detektori</title>
    <style>
        body {
            margin: 0;
            background: #0f1013;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .ai-box {
            background: #1a1b1f;
            padding: 30px;
            border-radius: 20px;
            border: 2px solid #333;
            text-align: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        #webcam-container {
            width: 350px;
            height: 350px;
            background: #000;
            border: 4px solid #ff4444;
            border-radius: 15px;
            margin: 20px 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        canvas { width: 100% !important; height: 100% !important; }
        .btn {
            background: #ff4444;
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1.1rem;
        }
        .btn:disabled { background: #555; cursor: not-allowed; }
        .result {
            font-size: 1.4rem;
            color: #ffcc00;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="ai-box">
    <button id="start-btn" class="btn" onclick="init()">MODELNI BOSHLASH</button>
    
    <div id="webcam-container">
        <div id="status">Kamera kutilmoqda...</div>
    </div>

    <div class="result">
        <div id="label-ot">otlar: 0%</div>
        <div id="label-boshqa">boshqa narsalar: 0%</div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

<script type="text/javascript">
    // Google Teachable Machine model linki
    const URL = "https://teachablemachine.withgoogle.com/models/I7S_v2vM-/"; 
    
    let model, webcam, labelOt, labelBoshqa, maxPredictions;

    async function init() {
        const btn = document.getElementById("start-btn");
        const status = document.getElementById("status");
        
        btn.disabled = true;
        btn.innerHTML = "Yuklanmoqda...";
        status.innerHTML = "Model yuklanmoqda, kuting...";

        try {
            const modelURL = URL + "model.json";
            const metadataURL = URL + "metadata.json";

            // 1. Modelni yuklash
            model = await tmImage.load(modelURL, metadataURL);
            maxPredictions = model.getTotalClasses();

            // 2. Kamerani sozlash
            const flip = true; 
            webcam = new tmImage.Webcam(350, 350, flip); 
            
            await webcam.setup(); // Kameraga ruxsat so'rash
            await webcam.play();
            
            window.requestAnimationFrame(loop);

            // 3. Ekranga chiqarish
            document.getElementById("webcam-container").innerHTML = "";
            document.getElementById("webcam-container").appendChild(webcam.canvas);
            
            labelOt = document.getElementById("label-ot");
            labelBoshqa = document.getElementById("label-boshqa");
            
            btn.style.display = "none"; // Tugmani yashirish
            
        } catch (e) {
            console.error(e);
            alert("XATOLIK: Kamera ochilmadi! Sababi: " + e.message);
            btn.disabled = false;
            btn.innerHTML = "MODELNI BOSHLASH";
            status.innerHTML = "Xatolik yuz berdi.";
        }
    }

    async function loop() {
        webcam.update(); 
        await predict();
        window.requestAnimationFrame(loop);
 async function predict() {
        const prediction = await model.predict(webcam.canvas);
        
        for (let i = 0; i < maxPredictions; i++) {
            let name = prediction[i].className.toLowerCase();
            let prob = (prediction[i].probability * 100).toFixed(0);

            if (name.includes("ot") || name.includes("horse")) {
                labelOt.innerHTML = otlar: ${prob}%;
            } else {
                labelBoshqa.innerHTML = boshqa narsalar: ${prob}%;
            }
        }
    }
</script>

</body>
</html>
