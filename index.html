<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Model - Ot Detektori</title>
    <style>
        body {
            margin: 0;
            background: #0f1013;
            color: white;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .ai-container {
            text-align: center;
            background: #1a1b1f;
            padding: 20px;
            border-radius: 20px;
            border: 1px solid #333;
        }
        #webcam-container {
            width: 400px;
            height: 400px;
            background: #000;
            border: 5px solid #ff4444;
            border-radius: 15px;
            margin: 20px auto;
            overflow: hidden;
        }
        canvas { width: 100%; height: 100%; }
        .btn-start {
            background: #ff4444;
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1.1rem;
        }
        .result {
            font-size: 1.5rem;
            margin-top: 15px;
            color: #ffcc00;
        }
    </style>
</head>
<body>

<div class="ai-container">
    <button class="btn-start" onclick="init()">MODELNI BOSHLASH</button>
    
    <div id="webcam-container"></div>

    <div class="result">
        <div id="label-ot">otlar: 0%</div>
        <div id="label-boshqa">boshqa narsalar: 0%</div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

<script type="text/javascript">
    const URL = "https://teachablemachine.withgoogle.com/models/I7S_v2vM-/"; 
    let model, webcam, labelOt, labelBoshqa, maxPredictions;

    async function init() {
        const modelURL = URL + "model.json";
        const metadataURL = URL + "metadata.json";

        model = await tmImage.load(modelURL, metadataURL);
        maxPredictions = model.getTotalClasses();

        webcam = new tmImage.Webcam(400, 400, true); 
        await webcam.setup(); 
        await webcam.play();
        window.requestAnimationFrame(loop);

        document.getElementById("webcam-container").appendChild(webcam.canvas);
        labelOt = document.getElementById("label-ot");
        labelBoshqa = document.getElementById("label-boshqa");
    }

    async function loop() {
        webcam.update(); 
        await predict();
        window.requestAnimationFrame(loop);
    }

    async function predict() {
        const prediction = await model.predict(webcam.canvas);
        for (let i = 0; i < maxPredictions; i++) {
            let name = prediction[i].className.toLowerCase();
            let prob = (prediction[i].probability * 100).toFixed(0);

            if (name.includes("ot") || name.includes("horse")) {
                labelOt.innerHTML = otlar: ${prob}%;
            } else {
                labelBoshqa.innerHTML = boshqa narsalar: ${prob}%;
            }
        }
    }
</script>

</body>
</html>
