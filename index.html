<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Ot Detektori | Otlar Dataset</title>
    <style>
        body {
            margin: 0;
            background: #0f1013; /* Rasmdagi qorong'u fon */
            color: white;
            font-family: 'Montserrat', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            padding: 30px;
            border-radius: 24px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 90%;
            max-width: 450px;
        }
        h1 { font-size: 1.5rem; margin-bottom: 10px; }
        p { color: #ccc; font-size: 0.9rem; margin-bottom: 25px; }
        
        #webcam-container {
            margin: 20px auto;
            border: 3px solid #3b82f6;
            border-radius: 15px;
            overflow: hidden;
            width: 300px;
            height: 300px;
            background: #000;
        }
        
        button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
        }
        button:hover { background: #2563eb; }
        
        #label-container {
            margin-top: 20px;
            font-size: 1.2rem;
            color: #10b981; /* Yashil rang natija uchun */
        }
    </style>
</head>
<body>

<div class="container">
    <h1>AI Ot Detektori</h1>
    <p>Otlar dataseti asosida ishlaydigan aqlli tizim</p>
    
    <button type="button" id="start-btn" onclick="init()">Kamerani Yoqish</button>
    
    <div id="webcam-container"></div>
    <div id="label-container">Kamera kutilmoqda...</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

<script type="text/javascript">
    // DIQQAT: Bu yerga o'tgan safar yaratgan model linkini qo'yamiz
    // Agar link bo'lmasa, Google-ning tayyor namunaviy modeli ishlatiladi
    const URL = "https://teachablemachine.withgoogle.com/models/I7S_v2vM-/"; 

    let model, webcam, labelContainer, maxPredictions;

    async function init() {
        const startBtn = document.getElementById("start-btn");
        startBtn.innerHTML = "Yuklanmoqda...";
        startBtn.disabled = true;

        const modelURL = URL + "model.json";
        const metadataURL = URL + "metadata.json";

        try {
            model = await tmImage.load(modelURL, metadataURL);
            maxPredictions = model.getTotalClasses();

            const flip = true; 
            webcam = new tmImage.Webcam(300, 300, flip); 
            await webcam.setup(); 
            await webcam.play();
            
            startBtn.style.display = "none"; // Tugmani yashirish
            window.requestAnimationFrame(loop);

            document.getElementById("webcam-container").appendChild(webcam.canvas);
            labelContainer = document.getElementById("label-container");
        } catch (e) {
            alert("Kameraga ruxsat berilmadi yoki model yuklanmadi!");
            startBtn.innerHTML = "Qayta urinish";
            startBtn.disabled = false;
        }
    }

    async function loop() {
        webcam.update(); 
        await predict();
        window.requestAnimationFrame(loop);
    }
 async function predict() {
        const prediction = await model.predict(webcam.canvas);
        // Eng yuqori natijani topish
        let bestLabel = "";
        let bestProb = 0;
        
        for (let i = 0; i < maxPredictions; i++) {
            if (prediction[i].probability > bestProb) {
                bestProb = prediction[i].probability;
                bestLabel = prediction[i].className;
            }
        }
        
        labelContainer.innerHTML = Natija: ${bestLabel} (${(bestProb * 100).toFixed(0)}%);
    }
</script>
</body>
</html>
