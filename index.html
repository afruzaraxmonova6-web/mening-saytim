<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>AI Ot Detektori</title>
    <style>
        body { background: #0f1013; color: white; text-align: center; font-family: sans-serif; }
        #webcam-container { 
            width: 350px; height: 350px; border: 5px solid #f39c12; 
            border-radius: 15px; margin: 20px auto; background: #000;
        }
        canvas { width: 100% !important; height: 100% !important; }
        .btn { padding: 15px 30px; background: #f39c12; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        /* NATIJA CHIQADIGAN JOY */
        #label-container { font-size: 24px; color: #f39c12; margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>
    <h2>AI Model: Otlarni aniqlash</h2>
    <button class="btn" onclick="init()">MODELNI BOSHLASH</button>
    
    <div id="webcam-container"></div>
    
    <div id="label-container">Kamera yongach, natija bu yerda chiqadi...</div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

    <script>
        const URL = "https://teachablemachine.withgoogle.com/models/6VmBEHEsL/";
        let model, webcam, labelContainer, maxPredictions;

        async function init() {
            try {
                // Modelni yuklash
                model = await tmImage.load(URL + "model.json", URL + "metadata.json");
                maxPredictions = model.getTotalClasses();

                // Kamerani yoqish
                webcam = new tmImage.Webcam(350, 350, true); 
                await webcam.setup(); 
                await webcam.play();
                window.requestAnimationFrame(loop);

                // Kamerani ekranga chiqarish
                document.getElementById("webcam-container").appendChild(webcam.canvas);
                
                // Natija maydonini tayyorlash
                labelContainer = document.getElementById("label-container");
                labelContainer.innerHTML = ""; // Eski yozuvni o'chirish
                for (let i = 0; i < maxPredictions; i++) {
                    labelContainer.appendChild(document.createElement("div"));
                }
            } catch (e) {
                alert("Xato: Kameraga ruxsat berilmagan yoki model yuklanmadi!");
            }
        }

        async function loop() {
            webcam.update(); 
            await predict();
            window.requestAnimationFrame(loop);
        }

        async function predict() {
            const prediction = await model.predict(webcam.canvas);
            for (let i = 0; i < maxPredictions; i++) {
                // Har bir natijani ekranga chiqarish (Masalan: otlar: 100%)
                labelContainer.childNodes[i].innerHTML = 
                    prediction[i].className + ": " + (prediction[i].probability * 100).toFixed(0) + "%";
            }
        }
    </script>
</body>
</html>
