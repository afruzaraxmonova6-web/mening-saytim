<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Ot Detektori</title>
    <style>
        body {
            margin: 0;
            background: #0f1013;
            color: white;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            background: #1a1b1f;
            padding: 30px;
            border-radius: 25px;
            border: 1px solid #333;
            text-align: center;
            width: 90%;
            max-width: 450px;
        }
        #webcam-container {
            width: 320px;
            height: 320px;
            background: #000;
            border: 4px solid #ff4444;
            border-radius: 20px;
            margin: 20px auto;
            overflow: hidden;
            position: relative;
        }
        canvas { width: 100% !important; height: 100% !important; }
        .btn {
            background: #ff4444;
            color: white;
            border: none;
            padding: 15px 35px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1.1rem;
            width: 100%;
        }
        .btn:disabled { background: #444; cursor: wait; }
        .result-text {
            font-size: 1.4rem;
            margin-top: 15px;
            color: #ffcc00;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>AI Ot Detektori</h2>
    <button id="start-btn" class="btn" onclick="init()">MODELNI BOSHLASH</button>
    
    <div id="webcam-container">
        <div id="status" style="position: absolute; top: 45%; width: 100%; color: #666;">Kamera kutilmoqda...</div>
    </div>

    <div class="result-text">
        <div id="label-ot">otlar: 0%</div>
        <div id="label-boshqa">boshqa: 0%</div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

<script type="text/javascript">
    // Bu model manzili Google serverida joylashgan
    const URL = "https://teachablemachine.withgoogle.com/models/I7S_v2vM-/"; 
    
    let model, webcam, maxPredictions;

    async function init() {
        const btn = document.getElementById("start-btn");
        const status = document.getElementById("status");
        
        btn.disabled = true;
        btn.innerHTML = "Yuklanmoqda...";
        status.innerHTML = "Model yuklanmoqda...";

        try {
            // 1. Modelni yuklash
            model = await tmImage.load(URL + "model.json", URL + "metadata.json");
            maxPredictions = model.getTotalClasses();

            // 2. Kamerani yoqish
            status.innerHTML = "Kameraga ruxsat bering...";
            webcam = new tmImage.Webcam(320, 320, true); 
            
            await webcam.setup(); // Kamera ruxsatini so'rash
            await webcam.play();
            
            window.requestAnimationFrame(loop);

            // 3. Ekranda ko'rsatish
            document.getElementById("webcam-container").innerHTML = "";
            document.getElementById("webcam-container").appendChild(webcam.canvas);
            btn.style.display = "none"; 
            
        } catch (e) {
            console.error(e);
            alert("Xato yuz berdi: " + e.message + "\n\nEslatma: Sayt faqat HTTPS manzilda ishlaydi!");
            btn.disabled = false;
            btn.innerHTML = "MODELNI BOSHLASH";
        }
    }

    async function loop() {
        webcam.update(); 
        await predict();
        window.requestAnimationFrame(loop);
    }
async function predict() {
        const prediction = await model.predict(webcam.canvas);
        
        for (let i = 0; i < maxPredictions; i++) {
            let name = prediction[i].className.toLowerCase();
            let prob = (prediction[i].probability * 100).toFixed(0);

            if (name.includes("ot") || name.includes("horse")) {
                document.getElementById("label-ot").innerHTML = otlar: ${prob}%;
            } else {
                document.getElementById("label-boshqa").innerHTML = boshqa: ${prob}%;
            }
        }
    }
</script>

</body>
</html>
