<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Ot Detektori - Faqat Model</title>
    <style>
        /* Sahifa markazida joylashtirish */
        body {
            margin: 0;
            background: #0f1013;
            color: white;
            font-family: 'Montserrat', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .ai-box {
            background: #16181d;
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h2 { color: #f39c12; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px; }

        /* Kamera oynasi */
        #webcam-container {
            margin: 0 auto;
            border: 5px solid #f39c12;
            border-radius: 15px;
            overflow: hidden;
            width: 350px;
            height: 350px;
            background: #000;
        }

        canvas { width: 100% !important; height: 100% !important; }

        /* Tugma dizayni */
        .btn-ai {
            background: #f39c12;
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            transition: 0.3s;
            margin-bottom: 20px;
        }

        .btn-ai:hover { background: #e67e22; transform: scale(1.05); }
        .btn-ai:disabled { background: #555; cursor: not-allowed; }

        /* Natija foizlari */
        #label-container {
            margin-top: 20px;
            font-size: 22px;
            color: #f39c12;
            font-weight: bold;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <div class="ai-box">
        <h2>AI Model: Otlarni aniqlash</h2>
        
        <button id="start-btn" class="btn-ai" onclick="init()">
            <i class="fas fa-play"></i> MODELNI BOSHLASH
        </button>

        <div id="webcam-container">
            </div>

        <div id="label-container">
            </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

    <script type="text/javascript">
        // Teachable Machine model manzili
        const URL = "https://teachablemachine.withgoogle.com/models/6VmBEHEsL/";
        let model, webcam, labelContainer, maxPredictions;

        async function init() {
            const startBtn = document.getElementById("start-btn");
            startBtn.innerHTML = "Yuklanmoqda...";
            startBtn.disabled = true;

            try {
                const modelURL = URL + "model.json";
                const metadataURL = URL + "metadata.json";

                // Modelni yuklash
                model = await tmImage.load(modelURL, metadataURL);
                maxPredictions = model.getTotalClasses();

                // Kamerani sozlash
                const flip = true; 
                webcam = new tmImage.Webcam(350, 350, flip); 
                await webcam.setup(); 
                await webcam.play();
                
                window.requestAnimationFrame(loop);

                // Ekranga chiqarish
                document.getElementById("webcam-container").appendChild(webcam.canvas);
                labelContainer = document.getElementById("label-container");
                labelContainer.innerHTML = ""; // Tozalash
[01.04.2026 18:31] ㅤㅤㅤㅤㅤ: for (let i = 0; i < maxPredictions; i++) {
                    labelContainer.appendChild(document.createElement("div"));
                }
                
                startBtn.style.display = "none"; // Kamera yongandan keyin tugmani yashirish
            } catch (e) {
                console.error(e);
                alert("Xatolik: Kamera ochilmadi yoki model yuklanmadi. Sayt HTTPS orqali ochilganiga ishonch hosil qiling!");
                startBtn.disabled = false;
                startBtn.innerHTML = "Qayta urinish";
            }
        }

        async function loop() {
            webcam.update(); 
            await predict();
            window.requestAnimationFrame(loop);
        }

        async function predict() {
            const prediction = await model.predict(webcam.canvas);
            for (let i = 0; i < maxPredictions; i++) {
                const classPrediction =
                    prediction[i].className + ": " + (prediction[i].probability * 100).toFixed(0) + "%";
                labelContainer.childNodes[i].innerHTML = classPrediction;
            }
        }
    </script>
</body>
</html>
