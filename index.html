<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Ot Detektori | Rahmonova Afruza</title>
    <style>
        /* Asosiy Dizayn */
        body {
            margin: 0;
            background: #0f1013;
            color: white;
            font-family: 'Montserrat', sans-serif;
            display: flex;
            height: 100vh;
        }

        /* Sidebar (Chap menyu) */
        .sidebar {
            width: 250px;
            background: #16171b;
            padding: 20px;
            border-right: 1px solid #333;
        }
        .sidebar h2 { color: #ff3333; font-size: 1.2rem; text-transform: uppercase; }
        .menu-item { padding: 10px 0; color: #888; cursor: pointer; display: block; text-decoration: none; }
        .menu-item:hover { color: white; }
        .active { color: #ff3333; font-weight: bold; }

        /* Asosiy Kontent */
        .main-content {
            flex-grow: 1;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .model-card {
            background: #1a1b1f;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #333;
        }

        /* Kamera oynasi (Kvadrat) */
        #webcam-container {
            width: 350px;
            height: 350px;
            background: #000;
            border: 4px solid #ff3333; /* Rasmdagi qizil-to'q sariq ramka */
            border-radius: 15px;
            margin: 20px 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        canvas { width: 100% !important; height: 100% !important; border-radius: 10px; }

        /* Tugma */
        .btn-start {
            background: #ff3333;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.3s;
        }
        .btn-start:hover { background: #cc0000; transform: scale(1.05); }

        /* Natija foizlari */
        .result-box {
            margin-top: 20px;
            text-align: left;
            width: 100%;
        }
        .result-item { font-size: 1.2rem; font-weight: bold; margin: 5px 0; }
        .otlar { color: #ffcc00; } /* Sariq rang */
        .boshqa { color: #ffcc00; opacity: 0.8; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>Rahmonova Afruza</h2>
    <a href="#" class="menu-item">Asosiy</a>
    <a href="#" class="menu-item">Statistika</a>
    <a href="#" class="menu-item active">AI Model</a>
    <a href="#" class="menu-item">Galereya</a>
    <a href="#" class="menu-item">Aloqa</a>
</div>

<div class="main-content">
    <div class="model-card">
        <button class="btn-start" onclick="init()">▶ Modelni Boshlash</button>
        
        <div id="webcam-container">
            <p id="loading-text" style="color: #666;">Kamera kutilmoqda...</p>
        </div>

        <div class="result-box">
            <div id="label-ot" class="result-item otlar">otlar: 0%</div>
            <div id="label-boshqa" class="result-item boshqa">boshqa narsalar: 0%</div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

<script type="text/javascript">
    // Teachable Machine model manzili
    const URL = "https://teachablemachine.withgoogle.com/models/I7S_v2vM-/"; 

    let model, webcam, labelOt, labelBoshqa, maxPredictions;
async function init() {
        document.getElementById("loading-text").innerHTML = "Yuklanmoqda...";
        
        const modelURL = URL + "model.json";
        const metadataURL = URL + "metadata.json";

        model = await tmImage.load(modelURL, metadataURL);
        maxPredictions = model.getTotalClasses();

        const flip = true; 
        webcam = new tmImage.Webcam(350, 350, flip); 
        await webcam.setup(); 
        await webcam.play();
        window.requestAnimationFrame(loop);

        document.getElementById("webcam-container").innerHTML = "";
        document.getElementById("webcam-container").appendChild(webcam.canvas);
        
        labelOt = document.getElementById("label-ot");
        labelBoshqa = document.getElementById("label-boshqa");
    }

    async function loop() {
        webcam.update(); 
        await predict();
        window.requestAnimationFrame(loop);
    }

    async function predict() {
        const prediction = await model.predict(webcam.canvas);
        
        // Model natijalarini olish
        for (let i = 0; i < maxPredictions; i++) {
            let name = prediction[i].className.toLowerCase();
            let prob = (prediction[i].probability * 100).toFixed(0);

            if (name.includes("ot") || name.includes("horse")) {
                labelOt.innerHTML = otlar: ${prob}%;
            } else {
                labelBoshqa.innerHTML = boshqa narsalar: ${prob}%;
            }
        }
    }
</script>

</body>
</html>
